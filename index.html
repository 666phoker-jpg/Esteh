<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EsTeh</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #030303;
    }

    body {
      overflow-x: hidden;
    }

    /* Isi utama website tetap bisa digunakan */
    .isi-halaman {
      position: relative;
      z-index: 2;
      min-height: 100vh;
    }

    /* Layer efek visual */
    #gold-effect {
      position: fixed;
      inset: 0;
      z-index: 9999;

      width: 100%;
      height: 100%;

      pointer-events: none;
      overflow: hidden;

      mix-blend-mode: screen;
    }

    /* Kilauan emas lembut */
    #gold-effect::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          circle at 50% 45%,
          rgba(255, 191, 0, 0.1),
          transparent 45%
        ),
        linear-gradient(
          90deg,
          transparent,
          rgba(49, 12, 255, 0.035),
          transparent
        );

      animation: goldPulse 4s ease-in-out infinite alternate;
    }

    /* Scanline glitch */
    #gold-effect::after {
      content: "";
      position: absolute;
      inset: 0;

      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(255, 200, 0, 0.035) 4px,
        transparent 5px
      );

      opacity: 0.6;
      animation: scanMove 8s linear infinite;
    }

    #rain-canvas {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      filter:
        drop-shadow(0 0 4px rgba(255, 190, 0, 0.8))
        drop-shadow(0 0 10px rgba(255, 145, 0, 0.4));
    }

    /* Potongan glitch emas */
    .glitch-line {
      position: absolute;
      left: -20%;

      width: 140%;
      height: 2px;

      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 174, 0, 0.3) 20%,
        #fff4a3 48%,
        #ffb300 55%,
        transparent 85%
      );

      box-shadow:
        0 0 5px #ffc400,
        0 0 15px rgba(255, 174, 0, 0.8);

      opacity: 0;
      animation: glitchFlash 4s steps(1) infinite;
    }

    .glitch-line:nth-child(2) {
      top: 17%;
      animation-delay: 0.4s;
    }

    .glitch-line:nth-child(3) {
      top: 36%;
      height: 4px;
      animation-delay: 1.7s;
    }

    .glitch-line:nth-child(4) {
      top: 58%;
      animation-delay: 2.8s;
    }

    .glitch-line:nth-child(5) {
      top: 79%;
      height: 3px;
      animation-delay: 3.4s;
    }

    .glitch-block {
      position: absolute;

      width: 120px;
      height: 8px;

      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 217, 92, 0.8),
        #ff9d00,
        transparent
      );

      filter: blur(0.4px);
      opacity: 0;

      animation: blockGlitch 5s steps(1) infinite;
    }

    .glitch-block:nth-child(6) {
      top: 24%;
      left: 10%;
      animation-delay: 1s;
    }

    .glitch-block:nth-child(7) {
      top: 47%;
      right: 8%;
      width: 220px;
      animation-delay: 2.2s;
    }

    .glitch-block:nth-child(8) {
      bottom: 16%;
      left: 35%;
      width: 170px;
      animation-delay: 3.6s;
    }

    @keyframes goldPulse {
      from {
        opacity: 0.45;
        transform: scale(1);
      }

      to {
        opacity: 0.85;
        transform: scale(1.08);
      }
    }

    @keyframes scanMove {
      from {
        transform: translateY(-30px);
      }

      to {
        transform: translateY(30px);
      }
    }

    @keyframes glitchFlash {
      0%,
      88%,
      100% {
        opacity: 0;
        transform: translateX(0) scaleX(1);
      }

      89% {
        opacity: 0.9;
        transform: translateX(-9%) scaleX(0.75);
      }

      91% {
        opacity: 0.45;
        transform: translateX(14%) scaleX(1.1);
      }

      93% {
        opacity: 0;
      }
    }

    @keyframes blockGlitch {
      0%,
      82%,
      100% {
        opacity: 0;
        transform: translateX(0);
      }

      84% {
        opacity: 0.9;
        transform: translateX(80px);
      }

      86% {
        opacity: 0.5;
        transform: translateX(-45px);
      }

      88% {
        opacity: 0;
      }
    }

    /* Mengurangi animasi pada perangkat yang meminta reduced motion */
    @media (prefers-reduced-motion: reduce) {
      #gold-effect::before,
      #gold-effect::after,
      .glitch-line,
      .glitch-block {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <!-- Masukkan seluruh isi website Anda di sini -->
  <main class="isi-halaman">
    <!-- Konten halaman tidak akan terganggu oleh efek -->
  </main>

  <!-- Efek berada di lapisan paling depan tetapi tidak bisa diklik -->
  <div id="gold-effect" aria-hidden="true">
    <canvas id="rain-canvas"></canvas>

    <span class="glitch-line"></span>
    <span class="glitch-line"></span>
    <span class="glitch-line"></span>
    <span class="glitch-line"></span>

    <span class="glitch-block"></span>
    <span class="glitch-block"></span>
    <span class="glitch-block"></span>
  </div>

  <script>
    const canvas = document.getElementById("rain-canvas");
    const ctx = canvas.getContext("2d");

    let width = 0;
    let height = 0;
    let pixelRatio = 1;
    let rainDrops = [];
    let particles = [];
    let animationFrame;

    function resizeCanvas() {
      pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;

      canvas.width = width * pixelRatio;
      canvas.height = height * pixelRatio;

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

      createRain();
      createParticles();
    }

    function createRain() {
      const amount = Math.min(
        230,
        Math.floor((width * height) / 7500)
      );

      rainDrops = [];

      for (let i = 0; i < amount; i++) {
        rainDrops.push(createDrop(true));
      }
    }

    function createDrop(randomPosition = false) {
      return {
        x: Math.random() * width,
        y: randomPosition
          ? Math.random() * height
          : -Math.random() * 300,

        length: Math.random() * 22 + 8,
        speed: Math.random() * 10 + 7,
        opacity: Math.random() * 0.55 + 0.15,
        thickness: Math.random() * 1.3 + 0.3,
        drift: Math.random() * 1.2 - 0.6
      };
    }

    function createParticles() {
      const amount = Math.min(
        90,
        Math.floor((width * height) / 15000)
      );

      particles = [];

      for (let i = 0; i < amount; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.8 + 0.4,
          speed: Math.random() * 0.7 + 0.15,
          opacity: Math.random() * 0.7 + 0.1,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function drawRain() {
      ctx.save();

      for (const drop of rainDrops) {
        const gradient = ctx.createLinearGradient(
          drop.x,
          drop.y,
          drop.x + drop.drift,
          drop.y + drop.length
        );

        gradient.addColorStop(0, "rgba(255, 215, 80, 0)");
        gradient.addColorStop(
          0.45,
          `rgba(255, 200, 30, ${drop.opacity})`
        );
        gradient.addColorStop(
          1,
          `rgba(255, 245, 170, ${drop.opacity * 0.9})`
        );

        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(
          drop.x + drop.drift,
          drop.y + drop.length
        );

        ctx.strokeStyle = gradient;
        ctx.lineWidth = drop.thickness;
        ctx.stroke();

        drop.y += drop.speed;
        drop.x += drop.drift * 0.15;

        if (
          drop.y > height + drop.length ||
          drop.x < -30 ||
          drop.x > width + 30
        ) {
          Object.assign(drop, createDrop(false));
        }
      }

      ctx.restore();
    }

    function drawParticles(time) {
      ctx.save();

      for (const particle of particles) {
        particle.y += particle.speed;

        if (particle.y > height + 10) {
          particle.y = -10;
          particle.x = Math.random() * width;
        }

        const shimmer =
          0.35 +
          Math.sin(time * 0.002 + particle.phase) * 0.25;

        ctx.beginPath();
        ctx.arc(
          particle.x,
          particle.y,
          particle.radius,
          0,
          Math.PI * 2
        );

        ctx.fillStyle =
          `rgba(255, 211, 70, ${particle.opacity * shimmer})`;

        ctx.shadowBlur = 9;
        ctx.shadowColor = "rgba(255, 174, 0, 0.9)";
        ctx.fill();
      }

      ctx.restore();
    }

    function drawGlitchSlices(time) {
      if (Math.random() > 0.965) {
        const sliceHeight = Math.random() * 5 + 1;
        const sliceY = Math.random() * height;
        const sliceWidth = Math.random() * width * 0.55 + 50;
        const sliceX = Math.random() * width;

        ctx.save();

        ctx.globalAlpha = Math.random() * 0.55 + 0.2;
        ctx.fillStyle = Math.random() > 0.5
          ? "#ffd84a"
          : "#ff9d00";

        ctx.shadowBlur = 12;
        ctx.shadowColor = "#ffb300";

        ctx.fillRect(
          sliceX,
          sliceY,
          sliceWidth,
          sliceHeight
        );

        ctx.restore();
      }

      if (Math.sin(time * 0.008) > 0.985) {
        ctx.save();

        ctx.globalAlpha = 0.12;
        ctx.fillStyle = "#ffd700";

        const y = Math.random() * height;
        ctx.fillRect(0, y, width, Math.random() * 4 + 1);

        ctx.restore();
      }
    }

    function animate(time = 0) {
      ctx.clearRect(0, 0, width, height);

      drawRain();
      drawParticles(time);
      drawGlitchSlices(time);

      animationFrame = requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resizeCanvas);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        cancelAnimationFrame(animationFrame);
      } else {
        animate();
      }
    });

    resizeCanvas();
    animate();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <title>EsTeh 404 Glitch</title>

  <style>
    /* Memanggil font Doctor Glitch dari folder yang sama */
    @font-face {
      font-family: "Doctor Glitch";
      src:
        url("Doctor-Glitch.otf") format("opentype"),
        url("Doctor-Glitch.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;

      /* Background benar-benar transparan */
      background: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glitch-wrapper {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 30px;

      /* Tidak mengganggu elemen lain */
      pointer-events: none;
      user-select: none;
    }

    .glitch {
      position: relative;

      font-family: "Doctor Glitch", Impact, sans-serif;
      font-size: clamp(60px, 16vw, 120px);
      font-weight: normal;
      line-height: 0.6;
      letter-spacing: 10px;

      /* Warna utama hitam */
      color: #080808d8;

      text-transform: uppercase;
      white-space: nowrap;

      /* Membuat tulisan lebih tajam dan metalik */
      -webkit-text-stroke: 1px rgba(238, 250, 70, 0.781);

      text-shadow:
        2px 2px 0 rgba(255, 255, 255, 0.2),
        -2px -2px 0 rgba(0, 0, 0, 0.7),
        0 8px 15px rgba(0, 0, 0, 0.35);

      animation:
        main-shake 4s infinite steps(1),
        black-flicker 2.7s infinite;
    }

    /* Lapisan glitch merah */
    .glitch::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;

      color: #050505;
      background: transparent;

      text-shadow:
        -6px 0 #ff004c,
        4px 0 #ff3131;

      clip-path: inset(0 0 70% 0);

      animation:
        glitch-red 1.7s infinite linear alternate-reverse,
        slice-red 2.4s infinite steps(1);
    }

    /* Lapisan glitch biru-cyan */
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;

      color: #050505;
      background: transparent;

      text-shadow:
        6px 0 #00eaff,
        -4px 0 #4d00ff;

      clip-path: inset(70% 0 0 0);

      animation:
        glitch-blue 1.3s infinite linear alternate-reverse,
        slice-blue 2s infinite steps(1);
    }

    /* Garis scan error */
    .scanline {
      position: absolute;
      left: 4%;
      width: 92%;
      height: 4px;

      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 0, 76, 0.8),
        rgba(0, 234, 255, 0.9),
        transparent
      );

      box-shadow:
        0 0 8px rgba(0, 234, 255, 0.8),
        0 0 12px rgba(255, 0, 76, 0.6);

      opacity: 0;

      animation: scan-error 3.2s infinite linear;
    }

    /* Potongan error tambahan */
    .error-block {
      position: absolute;
      width: 30%;
      height: 7px;
      left: 35%;
      top: 50%;

      background: #050505;

      opacity: 0;
      transform: skewX(-25deg);

      animation: error-block 2.8s infinite steps(1);
    }

    @keyframes glitch-red {
      0% {
        transform: translate(0);
      }

      20% {
        transform: translate(-5px, 2px);
      }

      40% {
        transform: translate(6px, -2px);
      }

      60% {
        transform: translate(-3px, 1px);
      }

      80% {
        transform: translate(4px, -1px);
      }

      100% {
        transform: translate(0);
      }
    }

    @keyframes glitch-blue {
      0% {
        transform: translate(0);
      }

      20% {
        transform: translate(6px, -1px);
      }

      40% {
        transform: translate(-7px, 2px);
      }

      60% {
        transform: translate(4px, 1px);
      }

      80% {
        transform: translate(-5px, -2px);
      }

      100% {
        transform: translate(0);
      }
    }

    @keyframes slice-red {
      0%,
      82%,
      100% {
        clip-path: inset(0 0 100% 0);
      }

      83% {
        clip-path: inset(8% 0 70% 0);
      }

      86% {
        clip-path: inset(42% 0 38% 0);
      }

      89% {
        clip-path: inset(72% 0 12% 0);
      }

      92% {
        clip-path: inset(25% 0 60% 0);
      }

      95% {
        clip-path: inset(55% 0 28% 0);
      }
    }

    @keyframes slice-blue {
      0%,
      76%,
      100% {
        clip-path: inset(100% 0 0 0);
      }

      77% {
        clip-path: inset(68% 0 10% 0);
      }

      81% {
        clip-path: inset(15% 0 66% 0);
      }

      85% {
        clip-path: inset(48% 0 32% 0);
      }

      89% {
        clip-path: inset(78% 0 6% 0);
      }

      93% {
        clip-path: inset(32% 0 50% 0);
      }
    }

    @keyframes main-shake {
      0%,
      79%,
      100% {
        transform: translate(0) skewX(0);
      }

      80% {
        transform: translate(-2px, 1px) skewX(2deg);
      }

      82% {
        transform: translate(4px, -1px) skewX(-3deg);
      }

      84% {
        transform: translate(-5px, 2px) skewX(4deg);
      }

      86% {
        transform: translate(3px, 0) skewX(-2deg);
      }

      88% {
        transform: translate(0) skewX(0);
      }
    }

    @keyframes black-flicker {
      0%,
      18%,
      22%,
      25%,
      53%,
      57%,
      100% {
        opacity: 1;
      }

      20%,
      24%,
      55% {
        opacity: 0.86;
      }
    }

    @keyframes scan-error {
      0%,
      72% {
        top: 5%;
        opacity: 0;
        transform: translateX(0);
      }

      74% {
        opacity: 1;
      }

      82% {
        top: 95%;
        opacity: 0.8;
        transform: translateX(8px);
      }

      84%,
      100% {
        top: 95%;
        opacity: 0;
      }
    }

    @keyframes error-block {
      0%,
      70%,
      100% {
        opacity: 0;
        transform: translateX(0) skewX(-25deg);
      }

      72% {
        opacity: 0.9;
        transform: translateX(-40px) skewX(-25deg);
      }

      74% {
        opacity: 0.5;
        transform: translateX(55px) skewX(-25deg);
      }

      76% {
        opacity: 0;
      }

      88% {
        opacity: 0.75;
        transform: translateX(30px) skewX(25deg);
      }

      90% {
        opacity: 0;
      }
    }

    /* Tampilan lebih nyaman di HP */
    @media (max-width: 600px) {
      .glitch {
        letter-spacing: 4px;
        -webkit-text-stroke: 0.5px rgba(255, 255, 255, 0.15);
      }

      .glitch-wrapper {
        padding: 15px;
      }
    }
  </style>
</head>

  <style>

      height: 100%;
      overflow: hidden;

      /* Berada di halaman paling depan */

      pointer-events: none;
    }

    /* Bentuk dasar koin */
    .coin {
      position: absolute;
      top: -80px;
      width: var(--coin-size);
      height: var(--coin-size);
      border-radius: 50%;

      background:
        radial-gradient(
          circle at 35% 30%,
          #fff9a6 0%,
          #ffe44d 15%,
          #f5b800 45%,
          #c77b00 75%,
          #7a3f00 100%
        );

      border: 2px solid #fff08a;

      box-shadow:
        0 0 8px rgba(255, 215, 0, 0.9),
        0 0 18px rgba(255, 170, 0, 0.6),
        inset 0 0 5px rgba(255, 255, 255, 0.8),
        inset 0 -5px 8px rgba(100, 45, 0, 0.55);

      opacity: var(--coin-opacity);

      animation:
        coin-fall var(--fall-duration) linear forwards,
        coin-spin var(--spin-duration) linear infinite;
    }

    /* Simbol pada koin */
    .coin::before {
      content: "$";
      position: absolute;
      inset: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #9b5700;
      font-size: calc(var(--coin-size) * 0.56);
      font-family: Georgia, serif;
      font-weight: bold;

      text-shadow: 1px 1px 1px rgba(255, 245, 130, 0.9);
    }

    /* Garis lingkaran bagian dalam */
    .coin::after {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(140, 75, 0, 0.7);
      border-radius: 50%;
    }

    /* Animasi koin jatuh */
    @keyframes coin-fall {
      0% {
        transform:
          translate3d(0, -100px, 0)
          rotateX(0deg)
          rotateY(0deg)
          rotateZ(0deg);
      }

      50% {
        transform:
          translate3d(var(--drift-half), 52vh, 0)
          rotateX(360deg)
          rotateY(540deg)
          rotateZ(180deg);
      }

      100% {
        transform:
          translate3d(var(--drift), 115vh, 0)
          rotateX(720deg)
          rotateY(1080deg)
          rotateZ(360deg);
      }
    }

    /* Animasi tambahan agar koin terlihat berputar */
    @keyframes coin-spin {
      0% {
        filter: brightness(0.9);
      }

      50% {
        filter: brightness(1.5);
      }

      100% {
        filter: brightness(0.9);
      }
    }

    /* Mengurangi animasi untuk pengguna tertentu */
    @media (prefers-reduced-motion: reduce) {
      .coin {
        animation-duration: 8s !important;
      }
    }
  </style>
</head>

<body>

  <!-- Lapisan efek koin -->
  <div id="coin-rain" aria-hidden="true"></div>

  <!-- Isi halaman Anda -->
  <main class="isi-halaman">
    <h1> </h1>

    <p>
      
    </p>


  </main>

  <script>
    const coinContainer = document.getElementById("coin-rain");

    /*
      Ubah angka ini untuk mengatur jumlah koin.
      Nilai lebih kecil = koin lebih sedikit.
      Nilai lebih besar = koin lebih banyak.
    */
    const coinInterval = 180;

    /*
      Batas maksimum koin di layar.
      Digunakan agar efek tidak memberatkan browser.
    */
    const maximumCoins = 60;

    function createCoin() {
      if (coinContainer.children.length >= maximumCoins) {
        return;
      }

      const coin = document.createElement("div");
      coin.classList.add("coin");

      const size = randomNumber(20, 48);
      const startPosition = randomNumber(0, window.innerWidth);
      const fallDuration = randomNumber(4, 8);
      const spinDuration = randomNumber(0.7, 1.8);
      const drift = randomNumber(-140, 140);
      const opacity = randomNumber(0.55, 1);

      coin.style.left = `${startPosition}px`;
      coin.style.setProperty("--coin-size", `${size}px`);
      coin.style.setProperty("--fall-duration", `${fallDuration}s`);
      coin.style.setProperty("--spin-duration", `${spinDuration}s`);
      coin.style.setProperty("--drift", `${drift}px`);
      coin.style.setProperty("--drift-half", `${drift / 2}px`);
      coin.style.setProperty("--coin-opacity", opacity);

      coinContainer.appendChild(coin);

      /*
        Menghapus koin setelah jatuh agar halaman
        tetap ringan dan tidak mengalami lag.
      */
      coin.addEventListener("animationend", function (event) {
        if (event.animationName === "coin-fall") {
          coin.remove();
        }
      });
    }

    function randomNumber(minimum, maximum) {
      return Math.random() * (maximum - minimum) + minimum;
    }

    /*
      Membuat beberapa koin langsung saat halaman dibuka.
    */
    for (let i = 0; i < 20; i++) {
      setTimeout(createCoin, i * 100);
    }

    /*
      Membuat hujan koin terus-menerus.
    */
    setInterval(createCoin, coinInterval);
  </script>

</body>
</html>
